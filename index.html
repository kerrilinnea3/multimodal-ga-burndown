<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multimodal GA Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #F8FAFC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #FFFFFF;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 40px 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 20px; font-weight: 700; color: #0F172A; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #94A3B8; margin-bottom: 32px; }
    label {
      display: block; font-size: 12px; font-weight: 600; color: #475569;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    input {
      width: 100%; border: 1px solid #E2E8F0; border-radius: 6px;
      padding: 10px 14px; font-size: 14px; font-family: inherit;
      color: #0F172A; margin-bottom: 18px; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #7C3AED; }
    button {
      width: 100%; background: #0F172A; color: #FFFFFF; border: none;
      border-radius: 6px; padding: 11px; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #1E293B; }
    button:disabled { opacity: 0.6; cursor: default; }
    .error {
      display: none; background: #FFF1F2; border: 1px solid #FECDD3;
      border-radius: 6px; color: #E11D48; font-size: 13px;
      padding: 10px 14px; margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Multimodal GA Status</h1>
    <p class="subtitle">Sign in to view the dashboard</p>
    <div class="error" id="error">Invalid username or password.</div>
    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" required />
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required />
      <button type="submit" id="btn">Sign in</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('error');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      err.style.display = 'none';
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });
      if (res.ok) {
        window.location.href = '/app';
      } else {
        err.style.display = 'block';
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
